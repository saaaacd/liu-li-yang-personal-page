<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIU LI-YANG</title>
  <meta name="description"
    content="LIU LI-YANG — Designer, Engineer, Creator. A personal portfolio page inspired by the Hostinger Adelina template." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Playfair+Display:ital,wght@1,400;1,600&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Decorative layers -->
  <div class="noise-overlay" aria-hidden="true"></div>
  <div class="gradient-blob" aria-hidden="true"></div>

  <!-- Header -->
  <header id="site-header">
    <div class="logo">
      <span class="icon">✦</span> LIU LI-YANG
    </div>
    <div class="availability">
      <span class="dot"></span>
      <span>Available for projects</span>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-content">
      <div class="title-container">
        <h1 class="first-name">LIU</h1>
        <h1 class="last-name">LI-YANG</h1>
        <span class="floating-text">designer &amp; creator</span>
      </div>
    </div>
  </section>

  <!-- Time Badge -->
  <div class="time-container" id="time-badge">
    <span class="time-label">Current Time</span>
    <span class="time-value" id="current-time">--:--:-- --</span>
    <span class="time-date" id="current-date"></span>
  </div>

  <script src="app.js"></script>
</body>

</html>
